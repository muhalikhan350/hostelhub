<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HostelHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page{min-height:100vh;display:flex;background:var(--bg-primary)}
    .auth-container{display:flex;width:100%;min-height:100vh}
    .auth-illustration{flex:1;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:white;position:relative;overflow:hidden}
    .auth-illustration::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:0.5}
    .auth-illustration-content{position:relative;z-index:1;text-align:center;max-width:400px}
    .auth-illustration-icon{font-size:5rem;margin-bottom:24px;opacity:0.9}
    .auth-illustration h2{font-size:2rem;font-weight:700;margin-bottom:16px}
    .auth-illustration p{font-size:1rem;opacity:0.85;line-height:1.7}
    .auth-form-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 40px;background:var(--bg-primary)}
    .auth-form{width:100%;max-width:420px}
    .auth-logo{display:flex;align-items:center;gap:10px;font-size:1.5rem;font-weight:800;color:var(--text-primary);margin-bottom:32px}
    .auth-logo-icon{width:40px;height:40px;background:var(--primary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem}
    .auth-header{margin-bottom:32px}
    .auth-header h1{font-size:1.75rem;font-weight:700;margin-bottom:8px;color:var(--text-primary)}
    .auth-header p{color:var(--text-secondary);font-size:0.95rem}
    .auth-divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--text-muted);font-size:0.85rem}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .social-login{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
    .social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);color:var(--text-primary);font-size:0.9rem;transition:all var(--transition-fast)}
    .social-btn:hover{background:var(--bg-tertiary)}
    .auth-footer{text-align:center;margin-top:24px;font-size:0.9rem;color:var(--text-secondary)}
    .auth-footer a{color:var(--primary);font-weight:600}
    .remember-forgot{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:0.9rem}
    .forgot-link{color:var(--primary);font-weight:500}
    .password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;background:none;border:none;font-size:1rem}
    .password-toggle:hover{color:var(--text-secondary)}
    @media(max-width:768px){.auth-illustration{display:none}.auth-form-wrapper{padding:40px 24px}}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-illustration">
        <div class="auth-illustration-content">
          <div class="auth-illustration-icon"><i class="fas fa-building"></i></div>
          <h2>Welcome Back!</h2>
          <p>Sign in to access your hostel management dashboard, manage rooms, track payments, and stay connected with your residents.</p>
        </div>
      </div>
      <div class="auth-form-wrapper">
        <div class="auth-form">
          <a href="index.html" class="auth-logo">
            <div class="auth-logo-icon"><i class="fas fa-building"></i></div>
            HostelHub
          </a>
          <div class="auth-header">
            <h1>Sign In</h1>
            <p>Enter your credentials to access your account</p>
          </div>
          <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">Username</label>
              <div class="input-icon-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input type="text" class="form-input" id="login-username" placeholder="Enter your username" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <div class="input-icon-wrapper" style="position:relative">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('login-password',this)">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="remember-forgot">
              <label class="form-check">
                <input type="checkbox" id="remember-me">
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-link" onclick="alert('Password reset link sent to your email');return false">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="padding:14px">
              <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
            <div id="login-error" style="display:none;margin-top:16px;padding:12px 16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);color:var(--danger);font-size:0.9rem;text-align:center;">
              <i class="fas fa-exclamation-circle"></i> Invalid Credentials
            </div>
          </form>
          <div class="auth-divider">or continue with</div>
          <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-microsoft"></i> Microsoft</button>
          </div>
          <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
          </div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;

      // Check hardcoded admin
      if ((username === 'admin' || username === 'admin@hostelhub.com') && password === 'admin123') {
        const userData = {
          id: 1,
          name: 'Admin User',
          email: 'admin@hostelhub.com',
          role: 'Administrator',
          avatar: 'https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff'
        };
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('user', JSON.stringify(userData));
        window.location.href = 'dashboard.html';
        return;
      }

      // Check registered users in localStorage
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const user = users.find(u => (u.email === username || u.name === username) && u.password === password);

      if (user) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
        return;
      }

      // Invalid credentials
      document.getElementById('login-error').style.display = 'block';
      setTimeout(() => document.getElementById('login-error').style.display = 'none', 3000);
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
