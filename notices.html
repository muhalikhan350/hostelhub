<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices - HostelHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .notice-card { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; transition: all var(--transition-fast); position: relative; }
    .notice-card:hover { box-shadow: var(--shadow-md); }
    .notice-card.pinned { border-left: 4px solid var(--primary); }
    .notice-pin { position: absolute; top: 16px; right: 16px; color: var(--primary); font-size: 1rem; }
    .notice-category { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 12px; }
    .notice-category.announcement { background: rgba(79,70,229,0.15); color: var(--primary); }
    .notice-category.event { background: rgba(16,185,129,0.15); color: var(--success); }
    .notice-category.urgent { background: rgba(239,68,68,0.15); color: var(--danger); }
    .notice-category.maintenance { background: rgba(245,158,11,0.15); color: var(--warning); }
    .notice-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
    .notice-content { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px; }
    .notice-meta { display: flex; gap: 16px; font-size: 0.85rem; color: var(--text-muted); }
    .notice-meta span { display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobile-overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="fas fa-building"></i></div>
      <span class="sidebar-brand">HostelHub</span>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="dashboard.html"><i class="fas fa-th-large"></i><span>Dashboard</span></a></li>
        <li><a href="rooms.html"><i class="fas fa-bed"></i><span>Rooms</span></a></li>
        <li><a href="students.html"><i class="fas fa-users"></i><span>Students</span></a></li>
        <li><a href="payments.html"><i class="fas fa-credit-card"></i><span>Payments</span></a></li>
        <li><a href="complaints.html"><i class="fas fa-wrench"></i><span>Complaints</span></a></li>
        <li><a href="notices.html" class="active"><i class="fas fa-bullhorn"></i><span>Notices</span></a></li>
        <li><a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-chevron-left"></i><span>Collapse</span></button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <button class="header-btn" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      <div class="header-search"><i class="fas fa-search"></i><input type="text" placeholder="Search notices..." data-search="notices"></div>
      <div class="header-actions">
        <button class="header-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
        <button class="header-btn" style="position:relative"><i class="fas fa-bell"></i><span class="badge-dot" id="notification-badge"></span></button>
        <div class="dropdown">
          <div class="header-profile dropdown-trigger">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="Profile">
            <div class="header-profile-info">
              <div class="header-profile-name">Admin User</div>
              <div class="header-profile-role">Administrator</div>
            <i class="fas fa-chevron-down" style="font-size:0.75rem;color:var(--text-muted)"></i>
          </div>
          <div class="dropdown-menu">
            <a href="settings.html" class="dropdown-item"><i class="fas fa-user"></i> Profile</a>
            <a href="settings.html" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item" onclick="logout();return false"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Notices & Announcements</h1>
          <p class="page-subtitle">Post and manage announcements for hostel residents.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-notice-modal')"><i class="fas fa-plus"></i> New Notice</button>
      </div>
      <div class="room-filters" style="margin-bottom:20px">
        <select class="form-select" onchange="filterNotices(this.value)" style="width:auto">
          <option value="">All Categories</option>
          <option value="announcement">Announcement</option>
          <option value="event">Event</option>
          <option value="urgent">Urgent</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
      <div id="notices-container"></div>
  </main>

  <div class="modal-overlay" id="add-notice-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">New Notice</h3>
        <button class="modal-close" onclick="closeModal('add-notice-modal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" placeholder="Notice title"></div>
          <div class="grid grid-cols-2 gap-4">
            <div class="form-group"><label class="form-label">Category</label>
              <select class="form-select">
                <option value="announcement">Announcement</option>
                <option value="event">Event</option>
                <option value="urgent">Urgent</option>
                <option value="maintenance">Maintenance</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Pin Notice</label>
              <select class="form-select">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
          <div class="form-group"><label class="form-label">Content</label><textarea class="form-textarea" placeholder="Write your notice content here..." style="min-height:150px"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-notice-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveNotice()"><i class="fas fa-paper-plane"></i> Post Notice</button>
      </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = 'login.html';
    }

    const noticesData = [
      {id:1,title:'Water Supply Maintenance - Jan 15',category:'maintenance',pinned:true,author:'Admin',date:'Jan 12, 2024',content:'Please be informed that there will be water supply maintenance on January 15, 2024, from 10:00 AM to 2:00 PM. Please store sufficient water in advance.'},
      {id:2,title:'New Year Celebration Event',category:'event',pinned:false,author:'Student Council',date:'Jan 10, 2024',content:'Join us for the New Year celebration in the common hall on January 20th at 6:00 PM. Dinner and entertainment will be provided. All residents are welcome!'},
      {id:3,title:'Important: Updated Hostel Rules',category:'announcement',pinned:true,author:'Admin',date:'Jan 8, 2024',content:'Please review the updated hostel rules and regulations. Key changes include revised quiet hours (10 PM - 6 AM) and updated visitor policies. Rules available on the notice board.'},
      {id:4,title:'Fire Safety Drill - Jan 18',category:'urgent',pinned:false,author:'Safety Team',date:'Jan 11, 2024',content:'Mandatory fire safety drill on January 18 at 11:00 AM. All residents must participate. Please follow the evacuation routes posted on each floor.'},
      {id:5,title:'WiFi Upgrade Scheduled',category:'maintenance',pinned:false,author:'IT Team',date:'Jan 9, 2024',content:'We are upgrading the hostel WiFi infrastructure on January 16. There may be intermittent connectivity during the upgrade period (2 AM - 6 AM).'}
    ];

    function renderNotices(data = noticesData) {
      const container = document.getElementById('notices-container');
      container.innerHTML = '';
      const sorted = [...data].sort((a, b) => b.pinned - a.pinned);
      sorted.forEach(notice => {
        const card = document.createElement('div');
        card.className = `notice-card ${notice.pinned ? 'pinned' : ''}`;
        card.setAttribute('data-search-target', 'notices');
        card.innerHTML = `
          ${notice.pinned ? '<div class="notice-pin"><i class="fas fa-thumbtack"></i></div>' : ''}
          <span class="notice-category ${notice.category}">
            <i class="fas ${notice.category === 'announcement' ? 'fa-bullhorn' : notice.category === 'event' ? 'fa-calendar' : notice.category === 'urgent' ? 'fa-exclamation-circle' : 'fa-wrench'}"></i>
            ${notice.category.charAt(0).toUpperCase() + notice.category.slice(1)}
          </span>
          <div class="notice-title">${notice.title}</div>
          <div class="notice-content">${notice.content}</div>
          <div class="notice-meta">
            <span><i class="fas fa-user"></i> ${notice.author}</span>
            <span><i class="fas fa-calendar"></i> ${notice.date}</span>
          </div>`;
        container.appendChild(card);
      });
    }

    function filterNotices(category) {
      const filtered = category ? noticesData.filter(n => n.category === category) : noticesData;
      renderNotices(filtered);
    }

    function saveNotice() {
      showToast('Success', 'Notice posted successfully', 'success');
      closeModal('add-notice-modal');
    }

    renderNotices();
  </script>
</body>
</html>
