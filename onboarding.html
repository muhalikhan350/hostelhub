<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Your Hostel - HostelHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .setup-page { min-height: 100vh; background: var(--bg-primary); padding: 40px 0; }
    .setup-container { max-width: 960px; margin: 0 auto; padding: 0 24px; }
    .setup-header { text-align: center; margin-bottom: 40px; }
    .setup-header h1 { font-size: 2rem; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
    .setup-header p { color: var(--text-secondary); }
    .setup-stepper { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 40px; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
    .step.active { color: var(--primary); }
    .step-dot { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; border: 2px solid var(--border); }
    .step.active .step-dot { background: var(--primary); color: white; border-color: var(--primary); }
    .step-line { width: 40px; height: 2px; background: var(--border); }
    .setup-card { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-md); padding: 32px; margin-bottom: 24px; }
    .setup-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: var(--text-primary); }
    .building-item { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
    .building-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .building-name { font-weight: 700; color: var(--text-primary); }
    .floor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .floor-box { background: var(--bg-card); border: 2px solid var(--border); border-radius: var(--radius-md); padding: 16px; text-align: center; cursor: pointer; transition: all var(--transition-fast); position: relative; }
    .floor-box:hover { border-color: var(--primary); transform: translateY(-2px); }
    .floor-box .floor-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .floor-box .floor-rooms { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .floor-actions { display: flex; gap: 6px; margin-top: 12px; justify-content: center; }
    .floor-actions button { width: 28px; height: 28px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
    .btn-add-floor { background: var(--success); color: white; }
    .btn-del-floor { background: var(--danger); color: white; }
    .btn-edit-floor { background: var(--bg-tertiary); color: var(--text-secondary); }
    .add-building-btn { width: 100%; padding: 16px; border: 2px dashed var(--border); border-radius: var(--radius-md); background: transparent; color: var(--text-secondary); font-weight: 600; cursor: pointer; transition: all var(--transition-fast); }
    .add-building-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(30,58,95,0.03); }
    .inventory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .inventory-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg-tertiary); border-radius: var(--radius-md); font-size: 0.9rem; }
    .inventory-item input { accent-color: var(--primary); }
    .setup-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }
    .room-mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 12px; }
    .room-mini { aspect-ratio: 1; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all var(--transition-fast); }
    .room-mini:hover { transform: scale(1.08); border-color: var(--primary); }
    .room-mini.ac { background: rgba(59,130,246,0.15); color: var(--info); }
    .room-mini.non-ac { background: rgba(16,185,129,0.15); color: var(--success); }
  </style>
</head>
<body>
  <div class="setup-page">
    <div class="setup-container">
      <div class="setup-header">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-size:1.5rem;margin:0 auto 20px;"><i class="fas fa-building"></i></div>
        <h1>Configure Your Hostel</h1>
        <p>Set up buildings, floors, and rooms to match your infrastructure.</p>
      </div>

      <div class="setup-stepper">
        <div class="step active"><div class="step-dot">1</div><span>Infrastructure</span></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-dot">2</div><span>Finance</span></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-dot">3</div><span>Done</span></div>
      </div>

      <!-- Building & Floor Editor -->
      <div class="setup-card">
        <h3><i class="fas fa-sitemap" style="color:var(--primary);margin-right:8px;"></i>Building & Floor Editor</h3>
        <div id="buildings-container"></div>
        <button class="add-building-btn" onclick="addBuilding()"><i class="fas fa-plus"></i> Add New Building</button>
      </div>

      <!-- Room Detailer -->
      <div class="setup-card">
        <h3><i class="fas fa-bed" style="color:var(--primary);margin-right:8px;"></i>Room Configuration</h3>
        <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px;">Click any room below to customize its details.</p>
        <div id="room-map"></div>
      </div>

      <div class="setup-footer">
        <button class="btn btn-secondary" onclick="location.href='register.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <button class="btn btn-primary" onclick="saveSetup()" style="padding:14px 32px"><i class="fas fa-save"></i> Save & Continue to Finance <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </div>

  <!-- Room Detail Modal -->
  <div class="modal-overlay" id="room-detail-modal">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-door-open"></i> Room Details</h3>
        <button class="modal-close" onclick="closeModal('room-detail-modal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Custom Room Name</label>
          <input type="text" class="form-input" id="room-custom-name" placeholder="e.g. Premium Suite 101">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="form-group">
            <label class="form-label">Bed Configuration</label>
            <select class="form-select" id="room-beds">
              <option value="1">1 Bed</option>
              <option value="2">2 Beds</option>
              <option value="3">3 Beds</option>
              <option value="4">4 Beds</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">AC Status</label>
            <select class="form-select" id="room-ac">
              <option value="ac">AC Room</option>
              <option value="non-ac">Non-AC Room</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Room Inventory</label>
          <div class="inventory-grid">
            <label class="inventory-item"><input type="checkbox" id="inv-table"> Study Table</label>
            <label class="inventory-item"><input type="checkbox" id="inv-almirah"> Almirah</label>
            <label class="inventory-item"><input type="checkbox" id="inv-fan"> Fan</label>
            <label class="inventory-item"><input type="checkbox" id="inv-washroom"> Attached Washroom</label>
            <label class="inventory-item"><input type="checkbox" id="inv-wifi"> WiFi Router</label>
            <label class="inventory-item"><input type="checkbox" id="inv-balcony"> Balcony</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('room-detail-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveRoomDetail()"><i class="fas fa-check"></i> Save Room</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    let hostelConfig = JSON.parse(localStorage.getItem('hostelConfig')) || {
      buildings: [
        { id: 1, name: 'Building A', floors: [
          { id: 1, label: 'Floor 1', rooms: 4 },
          { id: 2, label: 'Floor 2', rooms: 4 }
        ]}
      ],
      rooms: {}
    };
    let currentRoomId = null;

    function renderBuildings() {
      const container = document.getElementById('buildings-container');
      container.innerHTML = '';
      hostelConfig.buildings.forEach((building, bIndex) => {
        const div = document.createElement('div');
        div.className = 'building-item';
        div.innerHTML = `
          <div class="building-header">
            <div style="display:flex;align-items:center;gap:12px">
              <i class="fas fa-building" style="color:var(--primary)"></i>
              <input type="text" class="form-input" style="width:200px;padding:8px 12px;font-size:0.95rem;font-weight:700;border:none;background:transparent" value="${building.name}" onchange="renameBuilding(${bIndex},this.value)">
            </div>
            <button class="btn btn-sm btn-danger" onclick="deleteBuilding(${bIndex})"><i class="fas fa-trash"></i></button>
          </div>
          <div class="floor-grid">
            ${building.floors.map((floor, fIndex) => `
              <div class="floor-box">
                <div class="floor-label">${floor.label}</div>
                <div class="floor-rooms">${floor.rooms} Rooms</div>
                <div class="floor-actions">
                  <button class="btn-edit-floor" onclick="editFloorRooms(${bIndex},${fIndex},-1)" title="Remove room"><i class="fas fa-minus"></i></button>
                  <button class="btn-add-floor" onclick="editFloorRooms(${bIndex},${fIndex},1)" title="Add room"><i class="fas fa-plus"></i></button>
                  <button class="btn-del-floor" onclick="deleteFloor(${bIndex},${fIndex})" title="Delete floor"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            `).join('')}
            <div class="floor-box" style="border-style:dashed;background:transparent" onclick="addFloor(${bIndex})">
              <div style="font-size:1.5rem;color:var(--text-muted)"><i class="fas fa-plus"></i></div>
              <div class="floor-label">Add Floor</div>
            </div>
          </div>`;
        container.appendChild(div);
      });
      renderRoomMap();
    }

    function renderRoomMap() {
      const container = document.getElementById('room-map');
      container.innerHTML = '';
      let roomNum = 101;
      hostelConfig.buildings.forEach((building, bIndex) => {
        const bDiv = document.createElement('div');
        bDiv.style.marginBottom = '20px';
        bDiv.innerHTML = `<div style="font-weight:700;color:var(--text-primary);margin-bottom:10px;font-size:0.9rem;">${building.name}</div>`;
        building.floors.forEach((floor, fIndex) => {
          const fDiv = document.createElement('div');
          fDiv.style.marginBottom = '12px';
          fDiv.innerHTML = `<div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:6px;">${floor.label}</div>`;
          const grid = document.createElement('div');
          grid.className = 'room-mini-grid';
          for (let r = 0; r < floor.rooms; r++) {
            const roomId = `B${bIndex}-F${fIndex}-R${r}`;
            const roomData = hostelConfig.rooms[roomId] || {};
            const isAc = roomData.ac === 'ac';
            const btn = document.createElement('div');
            btn.className = `room-mini ${isAc ? 'ac' : 'non-ac'}`;
            btn.textContent = roomData.customName || `R${roomNum}`;
            btn.title = `${roomData.beds || 1} Bed${(roomData.beds||1)>1?'s':''} ${isAc?'AC':'Non-AC'}`;
            btn.onclick = () => openRoomDetail(roomId, roomNum);
            grid.appendChild(btn);
            roomNum++;
          }
          fDiv.appendChild(grid);
          bDiv.appendChild(fDiv);
        });
        container.appendChild(bDiv);
      });
    }

    function addBuilding() {
      const id = hostelConfig.buildings.length + 1;
      hostelConfig.buildings.push({ id, name: `Building ${String.fromCharCode(64+id)}`, floors: [{ id: 1, label: 'Floor 1', rooms: 4 }] });
      renderBuildings();
    }

    function deleteBuilding(index) {
      if (hostelConfig.buildings.length <= 1) { alert('At least one building is required'); return; }
      hostelConfig.buildings.splice(index, 1);
      renderBuildings();
    }

    function renameBuilding(index, name) {
      hostelConfig.buildings[index].name = name;
      renderRoomMap();
    }

    function addFloor(bIndex) {
      const floorNum = hostelConfig.buildings[bIndex].floors.length + 1;
      hostelConfig.buildings[bIndex].floors.push({ id: floorNum, label: `Floor ${floorNum}`, rooms: 4 });
      renderBuildings();
    }

    function deleteFloor(bIndex, fIndex) {
      hostelConfig.buildings[bIndex].floors.splice(fIndex, 1);
      renderBuildings();
    }

    function editFloorRooms(bIndex, fIndex, delta) {
      const newRooms = hostelConfig.buildings[bIndex].floors[fIndex].rooms + delta;
      if (newRooms < 1) return;
      hostelConfig.buildings[bIndex].floors[fIndex].rooms = newRooms;
      renderBuildings();
    }

    function openRoomDetail(roomId, displayNum) {
      currentRoomId = roomId;
      const data = hostelConfig.rooms[roomId] || {};
      document.getElementById('room-custom-name').value = data.customName || '';
      document.getElementById('room-beds').value = data.beds || '1';
      document.getElementById('room-ac').value = data.ac || 'non-ac';
      document.getElementById('inv-table').checked = data.inventory?.table || false;
      document.getElementById('inv-almirah').checked = data.inventory?.almirah || false;
      document.getElementById('inv-fan').checked = data.inventory?.fan || false;
      document.getElementById('inv-washroom').checked = data.inventory?.washroom || false;
      document.getElementById('inv-wifi').checked = data.inventory?.wifi || false;
      document.getElementById('inv-balcony').checked = data.inventory?.balcony || false;
      openModal('room-detail-modal');
    }

    function saveRoomDetail() {
      hostelConfig.rooms[currentRoomId] = {
        customName: document.getElementById('room-custom-name').value,
        beds: document.getElementById('room-beds').value,
        ac: document.getElementById('room-ac').value,
        inventory: {
          table: document.getElementById('inv-table').checked,
          almirah: document.getElementById('inv-almirah').checked,
          fan: document.getElementById('inv-fan').checked,
          washroom: document.getElementById('inv-washroom').checked,
          wifi: document.getElementById('inv-wifi').checked,
          balcony: document.getElementById('inv-balcony').checked
        }
      };
      localStorage.setItem('hostelConfig', JSON.stringify(hostelConfig));
      closeModal('room-detail-modal');
      renderRoomMap();
      showToast('Saved', 'Room details updated', 'success');
    }

    function saveSetup() {
      localStorage.setItem('hostelConfig', JSON.stringify(hostelConfig));
      showToast('Setup Complete', 'Hostel configuration saved', 'success');
      setTimeout(() => location.href = 'finance.html', 1200);
    }

    renderBuildings();
  </script>
</body>
</html>
